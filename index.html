    <style>
      html {
        overscroll-behavior: none;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Poppins', sans-serif;
        scroll-behavior: smooth;
        overflow-x: hidden;
        overscroll-behavior: none;
        background-color: #050505;
      }
      .font-cursive {
        font-family: 'Dancing Script', cursive;
      }
      .lights-container {
        position: relative;
        overflow: hidden;
      }
       .lights-container::before, .lights-container::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 0;
        will-change: transform;
      }
      .lights-container::before {
        width: 300px;
        height: 300px;
        background: rgba(255, 45, 85, 0.1);
        top: -50px;
        left: -100px;
        animation: moveLight1 15s infinite alternate;
      }
      .lights-container::after {
        width: 400px;
        height: 400px;
        background: rgba(255, 45, 85, 0.08);
        bottom: -100px;
        right: -150px;
        animation: moveLight2 20s infinite alternate;
      }

      @keyframes moveLight1 {
        from { transform: translate(-100px, -50px) scale(1); }
        to { transform: translate(100px, 100px) scale(1.2); }
      }

      @keyframes moveLight2 {
        from { transform: translate(-100px, 50px) scale(1.2); }
        to { transform: translate(100px, -100px) scale(1); }
      }

      #root {
        position: relative;
        z-index: 1;
        overscroll-behavior: none;
      }

      .react-datepicker__year-select,
      .react-datepicker__month-select {
          padding: 5px;
          border-radius: 8px;
          border: 1px solid rgba(255, 255, 255, 0.1);
          background: #0a0a0a;
          color: white;
          font-size: 0.9rem;
          cursor: pointer;
          margin: 0 4px;
      }
